<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St.Anns Halls Calendar</title>
<!-- 🔥 LOGO & FAVICON -->
<link rel="icon" type="image/png" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="apple-touch-icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="shortcut icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }

/* 🔥 MOBILE FIRST RESPONSIVE CALENDAR */
.fc {
  --fc-border-color: #e2e8f0;
  --fc-daygrid-event-border-color: #e2e8f0;
  background: #ffffff;
  border-radius: 16px;
  padding: 16px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  margin: 8px;
}

/* 🔥 RESPONSIVE PADDING */
@media (min-width: 640px) { .fc { padding: 20px; margin: 16px; } }
@media (min-width: 768px) { .fc { padding: 24px; margin: 24px; } }

.fc-toolbar { margin-bottom: 20px; }
.fc-toolbar-title { 
  font-size: 20px; 
  font-weight: 700; 
  color: #1e293b; 
}
@media (min-width: 768px) { .fc-toolbar-title { font-size: 24px; } }

.fc-button {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #64748b;
  border-radius: 10px;
  padding: 8px 14px;
  font-weight: 500;
  font-size: 13px;
  transition: all 0.3s ease;
  min-height: 36px;
}
@media (min-width: 768px) { 
  .fc-button { padding: 10px 18px; font-size: 14px; } 
}

.fc-button:hover { background: #f1f5f9; transform: translateY(-1px); }
.fc-button-primary {
  background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-color: #3b82f6;
  color: white;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}
.fc-button-primary:hover {
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  transform: translateY(-2px);
}

/* 🔥 NAV BUTTONS */
.fc-prev-button, .fc-next-button, .fc-today-button, .fc-button-group .fc-button {
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
  border-color: #14b8a6 !important;
  color: white !important;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3) !important;
  min-height: 36px !important;
}
.fc-prev-button:hover, .fc-next-button:hover, .fc-today-button:hover, .fc-button-group .fc-button:hover {
  background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%) !important;
  transform: translateY(-2px) !important;
}

/* 🔥 RESPONSIVE DAY CELLS */
.fc-daygrid-day {
  border: 1px solid #f1f5f9;
  border-radius: 10px;
  margin: 1px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: visible;
  padding-bottom: 6px;
  height: 72px; /* Fixed height for mobile */
  display: flex;
  flex-direction: column;
}
@media (min-width: 640px) { .fc-daygrid-day { height: 80px; margin: 2px; } }
@media (min-width: 768px) { .fc-daygrid-day { height: 90px; } }

.fc-daygrid-day:hover {
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}

.fc-daygrid-day-top {
  font-weight: 600;
  color: #64748b;
  font-size: 12px;
  padding: 6px 4px 2px;
  position: relative;
  z-index: 2;
  flex-shrink: 0;
}
@media (min-width: 640px) { .fc-daygrid-day-top { font-size: 13px; padding: 8px; } }
@media (min-width: 768px) { .fc-daygrid-day-top { font-size: 14px; } }

.fc-daygrid-day-future .fc-daygrid-day-top {
  font-weight: 700;
  color: #475569;
}
.fc-daygrid-day-future::after {
  content: '+';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 11px;
  font-weight: 700;
  color: #10b981;
  pointer-events: none;
  z-index: 3;
  line-height: 1;
}

.fc-day-today {
  background: transparent !important;
  position: relative;
  border-radius: 10px !important;
}
.fc-day-today .fc-daygrid-day-number {
  position: relative;
  z-index: 4;
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
  color: white !important;
  font-weight: 700 !important;
  font-size: 12px !important;
  border-radius: 50%;
  width: 28px;
  height: 28px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 2px auto 0;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.4);
}
@media (min-width: 640px) { 
  .fc-day-today .fc-daygrid-day-number { 
    width: 32px; 
    height: 32px; 
    font-size: 13px !important; 
  } 
}

/* 🔥 FIXED RED DOT - MOBILE SAFE */
.has-events .fc-daygrid-day-top::after {
  content: '';
  position: absolute;
  top: 4px;
  right: 4px;
  width: 10px;
  height: 10px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: 2px solid #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
  z-index: 15;
  animation: pulse 2s infinite;
  cursor: pointer;
}

.has-multiple-events .fc-daygrid-day-top::after {
  width: 14px !important;
  height: 14px !important;
  top: 2px !important;
  right: 2px !important;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.6) !important;
}

@keyframes pulse {
  0% { box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5); }
  50% { box-shadow: 0 2px 12px rgba(239, 68, 68, 0.8); }
  100% { box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5); }
}

.fc-daygrid-event { display: none !important; }

/* 🔥 PERFECT MOBILE MODAL */
.booking-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 10000; /* Higher z-index */
  backdrop-filter: blur(4px);
}

.modal-content {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: white;
  border-radius: 0;
  max-width: none;
  overflow-y: auto;
  animation: modalSlideUp 0.3s ease-out;
  display: flex;
  flex-direction: column;
}

@media (min-width: 640px) {
  .modal-content {
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    border-radius: 20px;
    max-width: 500px;
    width: 90%;
    max-height: 80vh;
    height: auto;
  }
}

@keyframes modalSlideUp {
  from { opacity: 0; transform: translateY(100%); }
  to { opacity: 1; transform: translateY(0); }
}

.modal-header {
  padding: 20px 20px 0;
  border-bottom: 1px solid #f1f5f9;
  position: sticky;
  top: 0;
  background: white;
  z-index: 10;
}
@media (min-width: 640px) { .modal-header { padding: 24px 24px 0; } }

.modal-title {
  font-size: 20px;
  font-weight: 700;
  color: #1e293b;
  margin: 0;
}
@media (min-width: 640px) { .modal-title { font-size: 24px; } }

.close-btn {
  position: absolute;
  top: 16px;
  right: 16px;
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  font-size: 20px;
  cursor: pointer;
  color: #64748b;
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  transition: all 0.2s;
}
@media (min-width: 640px) { 
  .close-btn { 
    top: 20px; 
    right: 24px; 
    width: 40px; 
    height: 40px; 
    font-size: 28px; 
  } 
}

.close-btn:hover {
  background: #f1f5f9;
  color: #1e293b;
  transform: scale(1.1);
}

.modal-body {
  padding: 20px;
  flex: 1;
}
@media (min-width: 640px) { .modal-body { padding: 24px; } }

.event-item {
  background: linear-gradient(135deg, #fef2f2 0%, #fde8e8 100%);
  border: 1px solid #fecaca;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  transition: all 0.2s;
}
.event-item:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 25px rgba(239, 68, 68, 0.15);
}

.event-time {
  font-size: 18px;
  font-weight: 700;
  color: #dc2626;
  margin-bottom: 4px;
}
.event-name {
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  margin: 0 0 8px 0;
}
.event-status {
  font-size: 14px;
  color: #64748b;
  display: flex;
  align-items: center;
  gap: 6px;
}

.no-events {
  text-align: center;
  padding: 40px 20px;
  color: #64748b;
}
.no-events svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}

/* 🔥 PERFECT GREEN BUTTON */
.book-now-btn {
  width: 100%;
  background: linear-gradient(135deg, #10b981 0%, #059669 100%);
  color: white;
  border: none;
  padding: 16px 20px;
  border-radius: 14px;
  font-size: 16px;
  font-weight: 700;
  box-shadow: 0 8px 25px rgba(16, 185, 129, 0.4);
  transition: all 0.3s ease;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 20px;
}
.book-now-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 12px 35px rgba(16, 185, 129, 0.5);
  background: linear-gradient(135deg, #059669 0%, #047857 100%);
}
@media (hover: none) { .book-now-btn:hover { transform: none; } }
</style>
</head>

<body class="bg-gray-50">
<!-- HEADER -->
<header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <a href="index.html#home" class="flex items-center gap-3 hover:scale-105 transition-transform">
    <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840" 
         alt="CampusHalls Logo" 
         class="w-10 h-10 rounded-xl shadow-lg object-cover"
         loading="lazy">
    <h1 class="text-lg font-semibold text-gray-900">St.Anns Halls</h1>

<!-- MAIN CONTENT -->
<div class="w-full">

    <h2 class="text-2xl font-semibold" id="hallTitle">Deickmann Hall</h2>
    <p class="text-gray-500 text-sm mt-1" id="hallInfo">Capacity: 200 seats • Click FREE dates to book | Click 🔴 RED DOT for event details</p>
    <div class="flex gap-3 mt-4">
      <span class="px-3 py-1 rounded-full bg-green-100 text-green-600 text-xs flex items-center gap-1">+ Available</span>

<!-- 🔥 EVENTS MODAL -->
<div id="eventsModal" class="booking-modal">

<footer class="bg-gradient-to-r from-green-500 to-teal-500 text-white text-center py-8 mt-20">

               class="w-12 h-12 rounded-2xl shadow-lg object-cover bg-white p-1"

        </div>
        <h3 class="font-bold text-2xl">St.Anns Halls</h3>
    </div>
      <p class="text-sm opacity-90">© 2026 St.Anns Halls. All rights reserved.</p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1VE0YP88fk7tJ-NynBt_A0dNnoMyVi44",
  authDomain: "hall-booking-de99d.firebaseapp.com",
  projectId: "hall-booking-de99d",
  storageBucket: "hall-booking-de99d.firebasestorage.app",
  messagingSenderId: "1077560501819",
  appId: "1:1077560501819:web:a57337c0cb22859d869e1e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let hallNameGlobal;
let calendar;
let currentOpenModalDate = null; // 🔥 Track open modal to prevent conflicts

document.addEventListener('DOMContentLoaded', function () {
  const urlParams = new URLSearchParams(window.location.search);
  hallNameGlobal = urlParams.get('hall');

  if (!hallNameGlobal) {
    alert("❌ No hall selected.");
    window.location.href = "index.html#availability";
    return;
  }

  hallNameGlobal = decodeURIComponent(hallNameGlobal).trim();

  const validHalls = ["Deickmann Hall", "Gnanamma Hall", "St.Joseph's Auditorium"];
  if (!validHalls.includes(hallNameGlobal)) {
    alert("❌ Invalid hall.");
    window.location.href = "index.html#availability";
    return;
  }

  const hallConfig = {
    "Deickmann Hall": { capacity: "200 seats", emoji: "📚" },
    "Gnanamma Hall": { capacity: "200 seats", emoji: "📖" },
    "St.Joseph's Auditorium": { capacity: "800 seats", emoji: "🎭" }
  };

  const config = hallConfig[hallNameGlobal];
  document.getElementById('hallTitle').textContent = `${config.emoji} ${hallNameGlobal}`;
  document.getElementById('hallInfo').textContent = `Capacity: ${config.capacity} • Click FREE dates to book | Click 🔴 RED DOT for event details`;

  const calendarEl = document.getElementById('calendar');
  
  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: "auto",
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,dayGridWeek'
    },
    timeZone: 'UTC',
    dayMaxEvents: 0,
    dayPopoverFormat: { month: 'long', day: 'numeric', year: 'numeric' },
    dateClick: function(info) {
      const today = new Date();
      today.setHours(0,0,0,0);
      const clickedDate = new Date(info.dateStr);
      clickedDate.setHours(0,0,0,0);

      if (clickedDate < today) {
        alert("❌ Cannot book past dates");
        return;
      }

      const formattedDate = info.dateStr.replace(/-/g, '/');
      window.location.href = `registration.html?hall=${encodeURIComponent(hallNameGlobal)}&date=${formattedDate}`;
    },
    eventDidMount: function(info) {
      info.el.style.display = 'none';
    }
  });

  calendar.render();

  // 🔥 LOAD EVENTS & ADD RED DOTS (STABLE VERSION)
  const q = query(collection(db, "bookings"), where("hall", "==", hallNameGlobal));
  
  onSnapshot(q, (snapshot) => {
    calendar.removeAllEvents();

    snapshot.forEach((doc) => {
      const data = doc.data();
      if (!data.date || !data.eventName || !data.startTime) return;

      let eventDate = new Date(data.date.replace(/\//g, '-'));
      if (isNaN(eventDate)) return;

      calendar.addEvent({
        id: doc.id,
        title: data.eventName,
        start: eventDate,
        display: 'none',
        extendedProps: {
          startTime: data.startTime,
          endTime: data.endTime || data.startTime,
          docId: doc.id
        }
      });
    });

    // 🔥 ONLY UPDATE INDICATORS, DON'T TOUCH EXISTING MODAL
    updateDayIndicators(calendar);
  });

  // 🔥 FIXED: SEPARATE INDICATOR UPDATES FROM CLICK HANDLERS
  function updateDayIndicators(calendar) {
    document.querySelectorAll('.fc-daygrid-day').forEach(dayEl => {
      const dateStr = dayEl.getAttribute('data-date');
      const events = calendar.getEvents().filter(e => 
        new Date(e.start).toDateString() === new Date(dateStr).toDateString()
      );
      
      // Remove old classes
      dayEl.classList.remove('has-events', 'has-multiple-events');
      
      if (events.length > 0) {
        dayEl.classList.add('has-events');
        if (events.length > 1) {
          dayEl.classList.add('has-multiple-events');
        }
      }
    });

    // 🔥 RE-ATTACH CLICK HANDLERS ONLY TO DAYS WITH EVENTS (STABLE)
    document.querySelectorAll('.fc-daygrid-day.has-events .fc-daygrid-day-top').forEach(topEl => {
      // Prevent duplicate handlers
      topEl.removeEventListener('click', handleRedDotClick);
      topEl.addEventListener('click', handleRedDotClick);
    });
  }

  // 🔥 STABLE CLICK HANDLER (STORED SEPARATELY)
  function handleRedDotClick(e) {
    e.stopPropagation();
    const dayEl = e.currentTarget.closest('.fc-daygrid-day');
    const dateStr = dayEl.getAttribute('data-date');
    const events = calendar.getEvents().filter(e => 
      new Date(e.start).toDateString() === new Date(dateStr).toDateString()
    );
    
    showEventsModal(dateStr, events);
  }

  // 🔥 MODAL SETUP
  const modal = document.getElementById('eventsModal');
  const closeBtn = document.getElementById('closeModal');
  const modalTitle = document.getElementById('modalDateTitle');
  const modalBody = document.getElementById('modalBody');

  function showEventsModal(dateStr, events) {
    currentOpenModalDate = dateStr; // Track open modal
    
    const date = new Date(dateStr);
    modalTitle.textContent = date.toLocaleDateString('en-US', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    if (events.length === 0) {
      modalBody.innerHTML = `
        <div class="no-events">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <h3 class="text-lg font-semibold text-gray-900 mb-2">No events</h3>
          <p class="text-sm mb-6">This date is completely free!</p>
          <button onclick="bookNow('${dateStr}')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 px-6 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex items-center justify-center gap-2">
            <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
            </svg>
            Book Now
          </button>
        </div>
      `;
    } else {
      const hasFreeSlots = events.length < 3; // Assume 24hr day, 8hr slots max
      modalBody.innerHTML = `
        ${events.map(event => {
          const startTime = formatTime(event.extendedProps.startTime);
          const endTime = formatTime(event.extendedProps.endTime);
          const timeRange = endTime ? `${startTime} - ${endTime}` : startTime;
          
          return `
            <div class="event-item">
              <div class="event-time">${timeRange}</div>
              <h3 class="event-name">${event.title}</h3>
              <div class="event-status">
                <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                Booked
              </div>
            </div>
          `;
        }).join('')}
        ${hasFreeSlots ? `
          <div class="mt-6 pt-6 border-t border-gray-100">
            <h4 class="text-lg font-semibold text-gray-900 mb-4 flex items-center gap-2">
              <span class="w-2 h-2 bg-green-500 rounded-full"></span>
              Free slots available
            </h4>
            <button onclick="bookNow('${dateStr}')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 px-6 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex items-center justify-center gap-2">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path>
              </svg>
              Book Available Slot
            </button>
          </div>
        ` : ''}
      `;
    }

    modal.style.display = 'block';
    document.body.style.overflow = 'hidden'; // Prevent background scroll
  }

  // 🔥 GLOBAL BOOK NOW FUNCTION
  window.bookNow = function(dateStr) {
    const formattedDate = dateStr.replace(/-/g, '/');
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
    window.location.href = `registration.html?hall=${encodeURIComponent(hallNameGlobal)}&date=${formattedDate}`;
  };

  function formatTime(timeStr) {
    if (!timeStr || timeStr.includes('AM') || timeStr.includes('PM')) return timeStr;
    
    try {
      const [hours, minutes] = timeStr.split(':');
      const date = new Date();
      date.setHours(parseInt(hours), parseInt(minutes) || 0, 0, 0);
      return date.toLocaleTimeString('en-US', { 
        hour: 'numeric', 
        minute: '2-digit', 
        hour12: true 
      });
    } catch(e) {
      return timeStr;
    }
  }

  // 🔥 MODAL CLOSE HANDLERS (STABLE)
  closeBtn.onclick = () => closeModal();
  window.onclick = (event) => {
    if (event.target === modal) closeModal();
  };

  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.style.display === 'block') {
      closeModal();
    }
  });

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
    currentOpenModalDate = null;
  }
});
</script>
</body>
</html>
