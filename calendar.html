<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>St.Anns Halls Calendar</title>
<link rel="icon" type="image/png" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="apple-touch-icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<link rel="shortcut icon" href="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
body { font-family: 'Inter', sans-serif; }
.fc {
  --fc-border-color: #e2e8f0;
  --fc-daygrid-event-border-color: #e2e8f0;
  background: #ffffff;
  border-radius: 16px;
  padding: 24px;
  box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
  margin: 0 24px;
}
.fc-toolbar { margin-bottom: 28px; }
.fc-toolbar-title { font-size: 24px; font-weight: 700; color: #1e293b; }
.fc-button {
  background: #f8fafc;
  border: 1px solid #e2e8f0;
  color: #64748b;
  border-radius: 10px;
  padding: 10px 18px;
  font-weight: 500;
  font-size: 14px;
  transition: all 0.3s ease;
}
.fc-button:hover { background: #f1f5f9; transform: translateY(-1px); }
.fc-button-primary {
  background: linear-gradient(135deg, #3b82f6 0%, #1d4ed8 100%);
  border-color: #3b82f6;
  color: white;
  box-shadow: 0 4px 12px rgba(59, 130, 246, 0.3);
}
.fc-button-primary:hover {
  background: linear-gradient(135deg, #2563eb 0%, #1e40af 100%);
  transform: translateY(-2px);
}
.fc-prev-button, .fc-next-button, .fc-today-button, .fc-button-group .fc-button {
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%) !important;
  border-color: #14b8a6 !important;
  color: white !important;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.3) !important;
}
.fc-prev-button:hover, .fc-next-button:hover, .fc-today-button:hover, .fc-button-group .fc-button:hover {
  background: linear-gradient(135deg, #0d9488 0%, #0f766e 100%) !important;
  transform: translateY(-2px) !important;
}
.fc-daygrid-day {
  border: 1px solid #f1f5f9;
  border-radius: 12px;
  margin: 2px;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  position: relative;
  overflow: visible;
  padding-bottom: 8px;
}
.fc-daygrid-day:hover {
  background: linear-gradient(135deg, #f8fafc 0%, #f1f5f9 100%);
  transform: translateY(-2px);
  box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
}
.fc-daygrid-day-top {
  font-weight: 600;
  color: #64748b;
  font-size: 14px;
  padding: 8px;
  position: relative;
  z-index: 2;
}
.fc-daygrid-day-future .fc-daygrid-day-top {
  font-weight: 700;
  color: #475569;
}
.fc-daygrid-day-future::after {
  content: '+';
  position: absolute;
  bottom: 2px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 12px;
  font-weight: 700;
  color: #10b981;
  pointer-events: none;
  z-index: 3;
  line-height: 1;
}
.fc-day-today {
  background: transparent !important;
  position: relative;
  border-radius: 12px !important;
}
.fc-day-today .fc-daygrid-day-number {
  position: relative;
  z-index: 4;
  background: linear-gradient(135deg, #14b8a6 0%, #0d9488 100%);
  color: white !important;
  font-weight: 700 !important;
  font-size: 13px !important;
  border-radius: 50%;
  width: 32px;
  height: 32px;
  display: flex;
  align-items: center;
  justify-content: center;
  margin: 4px auto 0;
  box-shadow: 0 4px 12px rgba(20, 184, 166, 0.4);
}

/* 🔥 FIXED RED DOT - ULTRA STABLE */
.has-events .fc-daygrid-day-top::after {
  content: '';
  position: absolute;
  top: 6px;
  right: 6px;
  width: 12px;
  height: 12px;
  background: linear-gradient(135deg, #ef4444, #dc2626);
  border: 2px solid #ffffff;
  border-radius: 50%;
  box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5);
  z-index: 15;
  animation: pulse 2s infinite;
  cursor: pointer;
}

.has-multiple-events .fc-daygrid-day-top::after {
  width: 16px !important;
  height: 16px !important;
  top: 4px !important;
  right: 4px !important;
  box-shadow: 0 4px 12px rgba(239, 68, 68, 0.6) !important;
}

@keyframes pulse {
  0% { box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5); }
  50% { box-shadow: 0 2px 12px rgba(239, 68, 68, 0.8); }
  100% { box-shadow: 0 2px 8px rgba(239, 68, 68, 0.5); }
}

/* 🔥 HIDE ALL EVENTS - ONLY SHOW RED DOT */
.fc-daygrid-event {
  display: none !important;
}

/* 🔥 MODAL STYLES */
.booking-modal {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.5);
  z-index: 1000;
  backdrop-filter: blur(4px);
}
.modal-content {
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: white;
  border-radius: 20px;
  max-width: 500px;
  width: 90%;
  max-height: 80vh;
  overflow-y: auto;
  box-shadow: 0 25px 50px rgba(0,0,0,0.25);
  animation: modalSlideIn 0.3s ease-out;
}
@keyframes modalSlideIn {
  from { opacity: 0; transform: translate(-50%, -60%); }
  to { opacity: 1; transform: translate(-50%, -50%); }
}
.modal-header {
  padding: 24px 24px 0;
  border-bottom: 1px solid #f1f5f9;
}
.modal-title {
  font-size: 24px;
  font-weight: 700;
  color: #1e293b;
  margin: 0;
}
.close-btn {
  position: absolute;
  top: 20px;
  right: 24px;
  background: none;
  border: none;
  font-size: 28px;
  cursor: pointer;
  color: #64748b;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  border-radius: 12px;
  transition: all 0.2s;
}
.close-btn:hover {
  background: #f1f5f9;
  color: #1e293b;
}
.modal-body {
  padding: 24px;
}
.event-item {
  background: linear-gradient(135deg, #fef2f2 0%, #fde8e8 100%);
  border: 1px solid #fecaca;
  border-radius: 12px;
  padding: 16px;
  margin-bottom: 12px;
  transition: all 0.2s;
}
.event-item:hover {
  transform: translateY(-1px);
  box-shadow: 0 8px 25px rgba(239, 68, 68, 0.15);
}
.event-time {
  font-size: 18px;
  font-weight: 700;
  color: #dc2626;
  margin-bottom: 4px;
}
.event-name {
  font-size: 16px;
  font-weight: 600;
  color: #1e293b;
  margin: 0 0 8px 0;
}
.event-status {
  font-size: 14px;
  color: #64748b;
  display: flex;
  align-items: center;
  gap: 6px;
}
.no-events {
  text-align: center;
  padding: 40px 20px;
  color: #64748b;
}
.no-events svg {
  width: 64px;
  height: 64px;
  margin-bottom: 16px;
  opacity: 0.5;
}
</style>
</head>

<body class="bg-gray-50">
<header class="bg-white border-b px-6 py-4 flex justify-between items-center sticky top-0 z-50 shadow-sm">
  <a href="index.html#home" class="flex items-center gap-3 hover:scale-105 transition-transform">
    <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840" 
         alt="CampusHalls Logo" 
         class="w-10 h-10 rounded-xl shadow-lg object-cover"
         loading="lazy">
    <h1 class="text-lg font-semibold text-gray-900">St.Anns Halls</h1>
  </a>
  <nav class="space-x-6 text-gray-600 font-medium text-sm">
    <a href="index.html#home" class="hover:text-green-600 font-semibold transition-colors">Home</a>
    <a href="index.html#availability" class="hover:text-green-600 font-semibold transition-colors">Availability</a>
  </nav>
</header>

<div class="w-full">
  <div class="bg-white px-8 py-6 border-b">
    <a href="index.html#availability" class="text-sm text-green-600 hover:text-green-700 font-medium mb-2 inline-block transition-colors flex items-center gap-1">
      ← Back to Halls
    </a>
    <h2 class="text-2xl font-semibold" id="hallTitle">Deickmann Hall</h2>
    <p class="text-gray-500 text-sm mt-1" id="hallInfo">Capacity: 200 seats • Click FREE dates to book | Click 🔴 RED DOT for event details</p>
    <div class="flex gap-3 mt-4">
      <span class="px-3 py-1 rounded-full bg-green-100 text-green-600 text-xs flex items-center gap-1">+ Available</span>

    </div>

    <div id="calendar"></div>

<div id="eventsModal" class="booking-modal">
  <div class="modal-content">
    <div class="modal-header">
      <h2 class="modal-title" id="modalDateTitle">Date</h2>
      <button class="close-btn" id="closeModal">&times;</button>

    <div class="modal-body" id="modalBody">
      </div>

<footer class="bg-gradient-to-r from-green-500 to-teal-500 text-white text-center py-8 mt-20">

      <div class="flex justify-center items-center gap-3 mb-4">

          <img src="https://ik.imagekit.io/syustaging/SYU_PREPROD/LOGO_Zd7PFpkXn.webp?tr=w-3840" 
               alt="St.Anns Logo" 
               class="w-12 h-12 rounded-2xl shadow-lg object-cover bg-white p-1"
               loading="lazy">
        </div>
        <h3 class="font-bold text-2xl">St.Anns Halls</h3>
    </div>
      <p class="text-sm opacity-90">© 2026 St.Anns Halls. All rights reserved.</p>
    </div>
</footer>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getFirestore, collection, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyA1VE0YP88fk7tJ-NynBt_A0dNnoMyVi44",
  authDomain: "hall-booking-de99d.firebaseapp.com",
  projectId: "hall-booking-de99d",
  storageBucket: "hall-booking-de99d.firebasestorage.app",
  messagingSenderId: "1077560501819",
  appId: "1:1077560501819:web:a57337c0cb22859d869e1e"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let hallNameGlobal;
let calendar;
let isModalOpen = false;

document.addEventListener('DOMContentLoaded', function () {
  const urlParams = new URLSearchParams(window.location.search);
  hallNameGlobal = urlParams.get('hall');

  if (!hallNameGlobal) {
    alert("❌ No hall selected.");
    window.location.href = "index.html#availability";
    return;
  }

  hallNameGlobal = decodeURIComponent(hallNameGlobal).trim();

  const validHalls = ["Deickmann Hall", "Gnanamma Hall", "St.Joseph's Auditorium"];
  if (!validHalls.includes(hallNameGlobal)) {
    alert("❌ Invalid hall.");
    window.location.href = "index.html#availability";
    return;
  }

  const hallConfig = {
    "Deickmann Hall": { capacity: "200 seats", emoji: "📚" },
    "Gnanamma Hall": { capacity: "200 seats", emoji: "📖" },
    "St.Joseph's Auditorium": { capacity: "800 seats", emoji: "🎭" }
  };

  const config = hallConfig[hallNameGlobal];
  document.getElementById('hallTitle').textContent = `${config.emoji} ${hallNameGlobal}`;
  document.getElementById('hallInfo').textContent = `Capacity: ${config.capacity} • Click FREE dates to book | Click 🔴 RED DOT for event details`;

  // 🔥 CALENDAR INITIALIZATION
  const calendarEl = document.getElementById('calendar');
  
  calendar = new FullCalendar.Calendar(calendarEl, {
    initialView: 'dayGridMonth',
    height: "auto",
    headerToolbar: {
      left: 'prev,next today',
      center: 'title',
      right: 'dayGridMonth,dayGridWeek'
    },
    timeZone: 'UTC',
    dayMaxEvents: 0,
    dayPopoverFormat: { month: 'long', day: 'numeric', year: 'numeric' },
    dateClick: function(info) {
      if (isModalOpen) return; 
      
      const today = new Date();
      today.setHours(0,0,0,0);
      const clickedDate = new Date(info.dateStr);
      clickedDate.setHours(0,0,0,0);

      if (clickedDate < today) {
        alert("❌ Cannot book past dates");
        return;
      }

      // Check if this date is already fully booked before redirecting via standard click
      const targetEvents = calendar.getEvents().filter(e => {
        const d = new Date(e.start);
        const yyyy = d.getUTCFullYear();
        const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(d.getUTCDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}` === info.dateStr;
      });

      if (targetEvents.length > 0) {
        // Evaluate if total window is full
        let bookedMins = 0;
        targetEvents.forEach(ev => {
          let s = parseTimeToMinutes(ev.extendedProps.startTime);
          let e = parseTimeToMinutes(ev.extendedProps.endTime) || (s + 60);
          const oStart = Math.max(s, 9 * 60);
          const oEnd = Math.min(e, 15 * 60);
          if (oEnd > oStart) bookedMins += (oEnd - oStart);
        });
        
        if (bookedMins >= 360 || targetEvents.length >= 2) {
          showEventsModal(info.dateStr, targetEvents);
          return;
        }
      }

      const formattedDate = info.dateStr.replace(/-/g, '/');
      window.location.href = `registration.html?hall=${encodeURIComponent(hallNameGlobal)}&date=${formattedDate}`;
    },
    eventDidMount: function(info) {
      info.el.style.display = 'none';
    }
  });

  calendar.render();

  // 🔥 STABLE EVENT LOADING
  const q = query(collection(db, "bookings"), where("hall", "==", hallNameGlobal));
  
  onSnapshot(q, (snapshot) => {
    calendar.removeAllEvents();

    snapshot.forEach((doc) => {
      const data = doc.data();
      if (!data.date || !data.eventName || !data.startTime) return;

      // Handle both forward slashes and dashes cleanly
      let dateString = data.date.replace(/\//g, '-');
      // Force date string initialization into a strict ISO format base to prevent local shift offsets
      if(!dateString.includes('T')) {
         const parts = dateString.split('-');
         if(parts[0].length === 4) {
            dateString = `${parts[0]}-${parts[1].padStart(2,'0')}-${parts[2].padStart(2,'0')}T00:00:00Z`;
         } else {
            dateString = `${parts[2]}-${parts[1].padStart(2,'0')}-${parts[0].padStart(2,'0')}T00:00:00Z`;
         }
      }

      let eventDate = new Date(dateString);
      if (isNaN(eventDate.getTime())) return;

      calendar.addEvent({
        id: doc.id,
        title: data.eventName,
        start: eventDate,
        display: 'none',
        extendedProps: {
          startTime: data.startTime,
          endTime: data.endTime || data.startTime,
          docId: doc.id
        }
      });
    });

    updateDayIndicators();
  });

  // 🔥 RED DOT INDICATORS
  function updateDayIndicators() {
    setTimeout(() => { 
      document.querySelectorAll('.fc-daygrid-day').forEach(dayEl => {
        const dateStr = dayEl.getAttribute('data-date');
        if (!dateStr) return;
        
        const events = calendar.getEvents().filter(e => {
          const d = new Date(e.start);
          const yyyy = d.getUTCFullYear();
          const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
          const dd = String(d.getUTCDate()).padStart(2, '0');
          return `${yyyy}-${mm}-${dd}` === dateStr;
        });
        
        dayEl.classList.remove('has-events', 'has-multiple-events');
        
        if (events.length > 0) {
          dayEl.classList.add('has-events');
          if (events.length >= 2) {
            dayEl.classList.add('has-multiple-events');
          }
        }
      });
    }, 150);
  }

  // 🔥 CLICK EVENT DELEGATION
  document.addEventListener('click', function(e) {
    if (isModalOpen) return; 
    
    const dayTop = e.target.closest('.fc-daygrid-day-top');
    const dayEl = e.target.closest('.fc-daygrid-day');
    
    if (dayEl && dayTop) {
      const dateStr = dayEl.getAttribute('data-date');
      const events = calendar.getEvents().filter(e => {
        const d = new Date(e.start);
        const yyyy = d.getUTCFullYear();
        const mm = String(d.getUTCMonth() + 1).padStart(2, '0');
        const dd = String(d.getUTCDate()).padStart(2, '0');
        return `${yyyy}-${mm}-${dd}` === dateStr;
      });
      
      if (events.length > 0) {
        e.preventDefault();
        e.stopPropagation();
        showEventsModal(dateStr, events);
      }
    }
  });

  // 🔥 MODAL DOM REFERENCES
  const modal = document.getElementById('eventsModal');
  const closeBtn = document.getElementById('closeModal');
  const modalTitle = document.getElementById('modalDateTitle');
  const modalBody = document.getElementById('modalBody');

  // 🔥 POWERFUL TIME PARSER
  function parseTimeToMinutes(timeStr) {
    if (!timeStr) return null;
    
    // Normalize variant spaces and cases
    const cleanStr = timeStr.trim().toUpperCase().replace(/\s+/g, '');
    
    // Try matching 12-hour components (eg: 09:30AM, 1PM, 3:00PM)
    const match12 = cleanStr.match(/^(\d{1,2})(?::(\d{2}))?(AM|PM)$/);
    if (match12) {
      let hours = parseInt(match12[1], 10);
      const minutes = match12[2] ? parseInt(match12[2], 10) : 0;
      const ampm = match12[3];
      
      if (ampm === 'PM' && hours < 12) hours += 12;
      if (ampm === 'AM' && hours === 12) hours = 0;
      return (hours * 60) + minutes;
    }
    
    // Fallback to 24-hour match format standard (eg: "14:30", "09:00")
    const match24 = cleanStr.match(/^(\d{1,2}):(\d{2})$/);
    if (match24) {
      return (parseInt(match24[1], 10) * 60) + parseInt(match24[2], 10);
    }
    
    return null;
  }

  // 🔥 TIME METRIC EVALUATION WINDOW (9am - 3pm)
  function showEventsModal(dateStr, events) {
    isModalOpen = true;
    
    // Normalize rendering local visual times safely
    const [y, m, d] = dateStr.split('-');
    const date = new Date(y, m - 1, d);
    
    modalTitle.textContent = date.toLocaleDateString('en-US', {
      weekday: 'long',
      year: 'numeric',
      month: 'long',
      day: 'numeric'
    });

    if (!events || events.length === 0) {
      modalBody.innerHTML = `
        <div class="no-events">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path>
          </svg>
          <h3 class="text-lg font-semibold text-gray-900 mb-2">No events</h3>
          <p class="text-sm mb-6">This date is completely free!</p>
          <button onclick="bookNow('${dateStr}')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 px-6 rounded-xl font-semibold text-lg shadow-lg hover:shadow-xl transform hover:-translate-y-1 transition-all duration-200 flex items-center justify-center gap-2">
            Book Now
          </button>
        </div>
      `;
    } else {
      const DAY_START = 9 * 60; // 09:00 AM
      const DAY_END = 15 * 60;  // 03:00 PM
      let totalBookedMinutes = 0;

      events.forEach(event => {
        let startMin = parseTimeToMinutes(event.extendedProps.startTime);
        let endMin = parseTimeToMinutes(event.extendedProps.endTime);

        if (startMin === null) return;
        if (endMin === null || endMin <= startMin) endMin = startMin + 60;

        const overlapStart = Math.max(startMin, DAY_START);
        const overlapEnd = Math.min(endMin, DAY_END);

        if (overlapEnd > overlapStart) {
          totalBookedMinutes += (overlapEnd - overlapStart);
        }
      });

      // If registered time blocks span 6 hours total OR there are multiple events booking slots out, flag full
      const isFullyBooked = totalBookedMinutes >= 360 || events.length >= 2;

      let htmlContent = events.map(event => {
        const startTime = formatTime(event.extendedProps.startTime);
        const endTime = formatTime(event.extendedProps.endTime);
        const timeRange = endTime ? `${startTime} - ${endTime}` : startTime;
        
        return `
          <div class="event-item border border-red-100 relative group/item">
            <div class="flex justify-between items-start">
              <div>
                <div class="event-time">${timeRange}</div>
                <h3 class="event-name">${event.title}</h3>
                <div class="event-status">
                  <span class="w-2 h-2 bg-red-500 rounded-full"></span>
                  Booked
                </div>
              </div>
            </div>
          </div>
        `;
      }).join('');

      if (isFullyBooked) {
        htmlContent += `
          <div class="mt-4 p-4 bg-red-50 rounded-xl text-center">
            <h4 class="text-base font-semibold text-red-600 flex items-center justify-center gap-2">
              <span class="w-2 h-2 bg-red-500 rounded-full animate-pulse"></span>
              Slots Full
            </h4>
            <p class="text-xs text-gray-500 mt-1">All standard operating hours (9:00 AM - 3:00 PM) are fully booked.</p>
          </div>
        `;
      } else {
        htmlContent += `
          <div class="mt-4">
            <button onclick="bookNow('${dateStr}')" class="w-full bg-gradient-to-r from-green-500 to-emerald-600 text-white py-3 px-6 rounded-xl font-semibold text-base shadow-md hover:shadow-lg transform hover:-translate-y-0.5 transition-all duration-200 flex items-center justify-center gap-2">
              Book Available Slot
            </button>
          </div>
        `;
      }

      htmlContent += `
        <div class="mt-6 pt-5 border-t border-gray-100 flex items-start gap-3 bg-slate-50 p-4 rounded-xl">
          <span class="text-xl mt-0.5">💡</span>
          <div class="text-left">
            <h4 class="text-xs font-bold text-gray-700 uppercase tracking-wider">Need to modify or cancel?</h4>
            <p class="text-xs text-gray-500 mt-1 leading-relaxed">
              To request a removal or change an existing reservation, contact hall administration at 
              <a href="tel:04023513020" class="text-green-600 font-semibold hover:underline">040 - 2351 3020</a> or via email at 
              <a href="mailto:info@stannscollegehyd.com" class="text-green-600 font-semibold hover:underline">info@stannscollegehyd.com</a>.
            </p>
          </div>
        </div>
      `;

      modalBody.innerHTML = htmlContent;
    }

    modal.style.display = 'block';
    document.body.style.overflow = 'hidden';
  }

  window.bookNow = function(dateStr) {
    const formattedDate = dateStr.replace(/-/g, '/');
    closeModal();
    setTimeout(() => {
      window.location.href = `registration.html?hall=${encodeURIComponent(hallNameGlobal)}&date=${formattedDate}`;
    }, 300);
  };

  function formatTime(timeStr) {
    if (!timeStr || timeStr.includes('AM') || timeStr.includes('PM')) return timeStr;
    try {
      const [hours, minutes] = timeStr.split(':');
      const date = new Date();
      date.setHours(parseInt(hours), parseInt(minutes) || 0, 0, 0);
      return date.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit', hour12: true });
    } catch(e) {
      return timeStr;
    }
  }

  function closeModal() {
    modal.style.display = 'none';
    document.body.style.overflow = 'auto';
    isModalOpen = false;
    updateDayIndicators();
  }

  closeBtn.onclick = closeModal;
  modal.onclick = (event) => { if (event.target === modal) closeModal(); };
  
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && modal.style.display === 'block') {
      closeModal();
    }
  });
});
</script>
</body>
</html>
